<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980" role="img" aria-labelledby="title desc">
  <title id="title">Diagrama UML de clases (alto nivel) - Terrave / NutriLen</title>
  <desc id="desc">Diagrama UML de alto nivel del proyecto Terrave NutriLen, organizado de izquierda a derecha y de arriba hacia abajo.</desc>
  <defs>
    <style>
      .bg { fill: #f5f7fb; }
      .frame { fill: #ffffff; stroke: #cfd8e3; stroke-width: 2; }
      .pkg { fill: #f8fafc; stroke: #475569; stroke-width: 2; }
      .box { fill: #ffffff; stroke: #60a5fa; stroke-width: 2; }
      .divider { stroke: #d6dee8; stroke-width: 1.2; }
      .arrow { fill: none; stroke: #334155; stroke-width: 2.2; }
      .dash { stroke-dasharray: 6 5; }
      .title { font: 700 28px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .section { font: 700 18px Arial, Helvetica, sans-serif; fill: #111827; }
      .classTitle { font: 700 14px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .text { font: 12px Consolas, "Courier New", monospace; fill: #1f2937; }
      .label { font: 12px Arial, Helvetica, sans-serif; fill: #334155; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1500" height="980" class="bg"/>
  <rect x="12" y="12" width="1476" height="956" rx="18" class="frame"/>
  <text x="750" y="52" text-anchor="middle" class="title">Diagrama UML de clases (alto nivel) - Terrave / NutriLen</text>

  <rect x="40" y="92" width="760" height="186" rx="6" class="pkg"/>
  <text x="420" y="118" text-anchor="middle" class="section">Modulo Encuestas</text>

  <rect x="60" y="148" width="200" height="104" rx="4" class="box"/>
  <line x1="60" y1="181" x2="260" y2="181" class="divider"/>
  <text x="160" y="169" text-anchor="middle" class="classTitle">EncuestasController</text>
  <text x="74" y="203" class="text">+create(body)</text>
  <text x="74" y="223" class="text">+createSession(body)</text>
  <text x="74" y="243" class="text">+updateSession(id, body)</text>

  <rect x="310" y="148" width="200" height="104" rx="4" class="box"/>
  <line x1="310" y1="181" x2="510" y2="181" class="divider"/>
  <text x="410" y="169" text-anchor="middle" class="classTitle">EncuestasService</text>
  <text x="324" y="203" class="text">+create(dto)</text>
  <text x="324" y="223" class="text">+createSession(dto)</text>
  <text x="324" y="243" class="text">+updateSession(id, dto)</text>

  <rect x="560" y="134" width="220" height="126" rx="4" class="box"/>
  <line x1="560" y1="167" x2="780" y2="167" class="divider"/>
  <text x="670" y="155" text-anchor="middle" class="classTitle">EncuestasRepository</text>
  <text x="572" y="191" class="text">-lastExpiredSessionsCleanupAt: number</text>
  <text x="572" y="213" class="text">+create(dto, id, fecha)</text>
  <text x="572" y="233" class="text">+createSession(id, dto)</text>
  <text x="572" y="253" class="text">+updateSession(id, dto)</text>

  <rect x="40" y="324" width="760" height="186" rx="6" class="pkg"/>
  <text x="420" y="350" text-anchor="middle" class="section">Modulo Estadisticas</text>

  <rect x="60" y="380" width="200" height="104" rx="4" class="box"/>
  <line x1="60" y1="413" x2="260" y2="413" class="divider"/>
  <text x="160" y="401" text-anchor="middle" class="classTitle">EstadisticasController</text>
  <text x="74" y="435" class="text">+getSummary(query)</text>
  <text x="74" y="455" class="text">+getStats(query)</text>
  <text x="74" y="475" class="text">+exportExcel(query, res)</text>

  <rect x="310" y="380" width="200" height="104" rx="4" class="box"/>
  <line x1="310" y1="413" x2="510" y2="413" class="divider"/>
  <text x="410" y="401" text-anchor="middle" class="classTitle">EstadisticasService</text>
  <text x="324" y="435" class="text">+getSurveys(query)</text>
  <text x="324" y="455" class="text">+getDashboardSummary(query)</text>
  <text x="324" y="475" class="text">+getExcelReport(query)</text>

  <rect x="560" y="372" width="220" height="96" rx="4" class="box"/>
  <line x1="560" y1="405" x2="780" y2="405" class="divider"/>
  <text x="670" y="393" text-anchor="middle" class="classTitle">EstadisticasRepository</text>
  <text x="572" y="427" class="text">+findAll(query)</text>
  <text x="572" y="447" class="text">+getDashboardSummary(query)</text>

  <rect x="860" y="324" width="580" height="186" rx="6" class="pkg"/>
  <text x="1150" y="350" text-anchor="middle" class="section">Seguridad e infraestructura</text>

  <rect x="890" y="390" width="220" height="78" rx="4" class="box"/>
  <line x1="890" y1="423" x2="1110" y2="423" class="divider"/>
  <text x="1000" y="411" text-anchor="middle" class="classTitle">AdminGuard</text>
  <text x="904" y="445" class="text">+canActivate(context)</text>

  <rect x="1150" y="380" width="260" height="104" rx="4" class="box"/>
  <line x1="1150" y1="413" x2="1410" y2="413" class="divider"/>
  <text x="1280" y="401" text-anchor="middle" class="classTitle">AdminService</text>
  <text x="1164" y="435" class="text">+getTokenFromAuthorization(...)</text>
  <text x="1164" y="455" class="text">+validateAdminToken(...)</text>
  <text x="1164" y="475" class="text">+getAccessProfileFromToken(...)</text>

  <rect x="160" y="570" width="1280" height="350" rx="6" class="pkg"/>
  <text x="800" y="596" text-anchor="middle" class="section">Dominio / Base de datos</text>

  <rect x="190" y="660" width="280" height="132" rx="4" class="box"/>
  <line x1="190" y1="693" x2="470" y2="693" class="divider"/>
  <text x="330" y="681" text-anchor="middle" class="classTitle">usuarios</text>
  <text x="204" y="715" class="text">+id: string</text>
  <text x="204" y="735" class="text">+activo: boolean</text>
  <text x="204" y="755" class="text">+fecha_registro: datetime</text>
  <text x="204" y="777" class="text">+nombre: string</text>
  <text x="204" y="797" class="text">+email: string</text>
  <text x="204" y="817" class="text">+rol: string</text>

  <rect x="560" y="640" width="500" height="232" rx="4" class="box"/>
  <line x1="560" y1="673" x2="1060" y2="673" class="divider"/>
  <line x1="560" y1="728" x2="1060" y2="728" class="divider"/>
  <text x="810" y="662" text-anchor="middle" class="classTitle">encuestas</text>
  <text x="574" y="698" class="text">+id: string</text>
  <text x="574" y="718" class="text">+usuario_id: string?</text>
  <text x="574" y="746" class="text">+fecha: datetime</text>
  <text x="574" y="766" class="text">+sexo: string</text>
  <text x="574" y="786" class="text">+dieta: string</text>
  <text x="574" y="806" class="text">+color: number</text>
  <text x="574" y="826" class="text">+aroma: number</text>
  <text x="574" y="846" class="text">+firmeza: number</text>
  <text x="818" y="746" class="text">+untuosidad: number</text>
  <text x="818" y="766" class="text">+sabor_tostado: number</text>
  <text x="818" y="786" class="text">+persistencia: number</text>
  <text x="818" y="806" class="text">+aceptacion: number</text>
  <text x="818" y="826" class="text">+liked: string</text>
  <text x="818" y="846" class="text">+consume_again: string</text>
  <text x="818" y="866" class="text">+recommend: number</text>

  <rect x="1130" y="668" width="270" height="178" rx="4" class="box"/>
  <line x1="1130" y1="701" x2="1400" y2="701" class="divider"/>
  <text x="1265" y="689" text-anchor="middle" class="classTitle">encuesta_sesiones</text>
  <text x="1144" y="723" class="text">+id: string</text>
  <text x="1144" y="743" class="text">+encuesta_id: string?</text>
  <text x="1144" y="763" class="text">+client_session_key: string</text>
  <text x="1144" y="783" class="text">+estado: string</text>
  <text x="1144" y="803" class="text">+paso_actual: number</text>
  <text x="1144" y="823" class="text">+fecha_inicio: datetime</text>
  <text x="1144" y="843" class="text">+fecha_actualizacion: datetime</text>
  <text x="1144" y="863" class="text">+fecha_envio: datetime?</text>

  <line x1="260" y1="200" x2="310" y2="200" class="arrow" marker-end="url(#arrow)"/>
  <line x1="510" y1="200" x2="560" y2="200" class="arrow" marker-end="url(#arrow)"/>
  <line x1="260" y1="432" x2="310" y2="432" class="arrow" marker-end="url(#arrow)"/>
  <line x1="510" y1="432" x2="560" y2="432" class="arrow" marker-end="url(#arrow)"/>
  <line x1="260" y1="456" x2="890" y2="456" class="arrow" marker-end="url(#arrow)"/>
  <line x1="1110" y1="429" x2="1150" y2="429" class="arrow" marker-end="url(#arrow)"/>

  <line x1="470" y1="726" x2="560" y2="726" class="arrow" marker-end="url(#arrow)"/>
  <text x="495" y="714" class="label">usuario_id</text>
  <text x="498" y="746" class="label">1</text>
  <text x="540" y="746" class="label">0..*</text>

  <line x1="1060" y1="756" x2="1130" y2="756" class="arrow" marker-end="url(#arrow)"/>
  <text x="1082" y="744" class="label">encuesta_id</text>
  <text x="1090" y="776" class="label">1</text>
  <text x="1118" y="776" class="label">0..1</text>

  <path d="M 670 260 L 670 610 L 790 610 L 790 640" class="arrow dash" marker-end="url(#arrow)"/>
  <path d="M 690 260 L 690 620 L 1265 620 L 1265 668" class="arrow dash" marker-end="url(#arrow)"/>
  <path d="M 670 468 L 670 590 L 830 590 L 830 640" class="arrow dash" marker-end="url(#arrow)"/>
  <path d="M 690 468 L 690 600 L 1285 600 L 1285 668" class="arrow dash" marker-end="url(#arrow)"/>
</svg>
