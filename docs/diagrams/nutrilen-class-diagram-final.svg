<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980" role="img" aria-labelledby="title desc">
  <title id="title">Diagrama UML de clases (alto nivel) - Terrave / NutriLen</title>
  <desc id="desc">Diagrama UML de alto nivel del proyecto Terrave NutriLen, organizado de izquierda a derecha y de arriba hacia abajo.</desc>
  <defs>
    <style>
      .bg { fill: #f5f7fb; }
      .frame { fill: #ffffff; stroke: #cfd8e3; stroke-width: 2; }
      .pkg { fill: #f8fafc; stroke: #475569; stroke-width: 2; }
      .box { fill: #ffffff; stroke: #60a5fa; stroke-width: 2; }
      .divider { stroke: #d6dee8; stroke-width: 1.2; }
      .arrow { fill: none; stroke: #334155; stroke-width: 2.2; }
      .dash { stroke-dasharray: 6 5; }
      .title { font: 700 28px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .section { font: 700 18px Arial, Helvetica, sans-serif; fill: #111827; }
      .classTitle { font: 700 14px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .text { font: 12px Consolas, "Courier New", monospace; fill: #1f2937; }
      .label { font: 12px Arial, Helvetica, sans-serif; fill: #334155; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1500" height="980" class="bg"/>
  <rect x="12" y="12" width="1476" height="956" rx="18" class="frame"/>
  <text x="750" y="52" text-anchor="middle" class="title">Diagrama UML de clases (alto nivel) - Terrave / NutriLen</text>

  <rect x="40" y="92" width="700" height="186" rx="6" class="pkg"/>
  <text x="390" y="118" text-anchor="middle" class="section">Modulo Encuestas</text>

  <rect x="60" y="148" width="200" height="104" rx="4" class="box"/>
  <line x1="60" y1="181" x2="260" y2="181" class="divider"/>
  <text x="160" y="169" text-anchor="middle" class="classTitle">EncuestasController</text>
  <text x="74" y="203" class="text">+create(body)</text>
  <text x="74" y="223" class="text">+createSession(body)</text>
  <text x="74" y="243" class="text">+updateSession(id, body)</text>

  <rect x="310" y="148" width="200" height="104" rx="4" class="box"/>
  <line x1="310" y1="181" x2="510" y2="181" class="divider"/>
  <text x="410" y="169" text-anchor="middle" class="classTitle">EncuestasService</text>
  <text x="324" y="203" class="text">+create(dto)</text>
  <text x="324" y="223" class="text">+createSession(dto)</text>
  <text x="324" y="243" class="text">+updateSession(id, dto)</text>

  <rect x="560" y="134" width="160" height="118" rx="4" class="box"/>
  <line x1="560" y1="167" x2="720" y2="167" class="divider"/>
  <text x="640" y="155" text-anchor="middle" class="classTitle">EncuestasRepository</text>
  <text x="572" y="191" class="text">-lastExpiredSessionsCleanupAt: number</text>
  <text x="572" y="213" class="text">+create(dto, id, fecha)</text>
  <text x="572" y="233" class="text">+createSession(id, dto)</text>
  <text x="572" y="253" class="text">+updateSession(id, dto)</text>

  <rect x="40" y="324" width="700" height="186" rx="6" class="pkg"/>
  <text x="390" y="350" text-anchor="middle" class="section">Modulo Estadisticas</text>

  <rect x="60" y="380" width="200" height="104" rx="4" class="box"/>
  <line x1="60" y1="413" x2="260" y2="413" class="divider"/>
  <text x="160" y="401" text-anchor="middle" class="classTitle">EstadisticasController</text>
  <text x="74" y="435" class="text">+getSummary(query)</text>
  <text x="74" y="455" class="text">+getStats(query)</text>
  <text x="74" y="475" class="text">+exportExcel(query, res)</text>

  <rect x="310" y="380" width="200" height="104" rx="4" class="box"/>
  <line x1="310" y1="413" x2="510" y2="413" class="divider"/>
  <text x="410" y="401" text-anchor="middle" class="classTitle">EstadisticasService</text>
  <text x="324" y="435" class="text">+getSurveys(query)</text>
  <text x="324" y="455" class="text">+getDashboardSummary(query)</text>
  <text x="324" y="475" class="text">+getExcelReport(query)</text>

  <rect x="560" y="380" width="160" height="88" rx="4" class="box"/>
  <line x1="560" y1="413" x2="720" y2="413" class="divider"/>
  <text x="640" y="401" text-anchor="middle" class="classTitle">EstadisticasRepository</text>
  <text x="572" y="435" class="text">+findAll(query)</text>
  <text x="572" y="455" class="text">+getDashboardSummary(query)</text>

  <rect x="820" y="324" width="620" height="186" rx="6" class="pkg"/>
  <text x="1130" y="350" text-anchor="middle" class="section">Seguridad e infraestructura</text>

  <rect x="850" y="390" width="220" height="78" rx="4" class="box"/>
  <line x1="850" y1="423" x2="1070" y2="423" class="divider"/>
  <text x="960" y="411" text-anchor="middle" class="classTitle">AdminGuard</text>
  <text x="864" y="445" class="text">+canActivate(context)</text>

  <rect x="1120" y="380" width="290" height="104" rx="4" class="box"/>
  <line x1="1120" y1="413" x2="1410" y2="413" class="divider"/>
  <text x="1265" y="401" text-anchor="middle" class="classTitle">AdminService</text>
  <text x="1134" y="435" class="text">+getTokenFromAuthorization(...)</text>
  <text x="1134" y="455" class="text">+validateAdminToken(...)</text>
  <text x="1134" y="475" class="text">+getAccessProfileFromToken(...)</text>

  <rect x="220" y="568" width="1215" height="348" rx="6" class="pkg"/>
  <text x="828" y="594" text-anchor="middle" class="section">Dominio / Base de datos</text>

  <rect x="250" y="632" width="280" height="132" rx="4" class="box"/>
  <line x1="250" y1="665" x2="530" y2="665" class="divider"/>
  <text x="390" y="653" text-anchor="middle" class="classTitle">usuarios</text>
  <text x="264" y="687" class="text">+id: string</text>
  <text x="264" y="707" class="text">+activo: boolean</text>
  <text x="264" y="727" class="text">+fecha_registro: datetime</text>
  <text x="264" y="749" class="text">+nombre: string</text>
  <text x="264" y="769" class="text">+email: string</text>
  <text x="264" y="789" class="text">+rol: string</text>

  <rect x="620" y="618" width="470" height="230" rx="4" class="box"/>
  <line x1="620" y1="651" x2="1090" y2="651" class="divider"/>
  <line x1="620" y1="706" x2="1090" y2="706" class="divider"/>
  <text x="855" y="640" text-anchor="middle" class="classTitle">encuestas</text>
  <text x="634" y="676" class="text">+id: string</text>
  <text x="634" y="696" class="text">+usuario_id: string?</text>
  <text x="634" y="724" class="text">+fecha: datetime</text>
  <text x="634" y="744" class="text">+sexo: string</text>
  <text x="634" y="764" class="text">+dieta: string</text>
  <text x="634" y="784" class="text">+color: number</text>
  <text x="634" y="804" class="text">+aroma: number</text>
  <text x="634" y="824" class="text">+firmeza: number</text>
  <text x="860" y="724" class="text">+untuosidad: number</text>
  <text x="860" y="744" class="text">+sabor_tostado: number</text>
  <text x="860" y="764" class="text">+persistencia: number</text>
  <text x="860" y="784" class="text">+aceptacion: number</text>
  <text x="860" y="804" class="text">+liked: string</text>
  <text x="860" y="824" class="text">+consume_again: string</text>
  <text x="860" y="844" class="text">+recommend: number</text>

  <rect x="1150" y="646" width="250" height="178" rx="4" class="box"/>
  <line x1="1150" y1="679" x2="1400" y2="679" class="divider"/>
  <text x="1275" y="667" text-anchor="middle" class="classTitle">encuesta_sesiones</text>
  <text x="1164" y="701" class="text">+id: string</text>
  <text x="1164" y="721" class="text">+encuesta_id: string?</text>
  <text x="1164" y="741" class="text">+client_session_key: string</text>
  <text x="1164" y="761" class="text">+estado: string</text>
  <text x="1164" y="781" class="text">+paso_actual: number</text>
  <text x="1164" y="801" class="text">+fecha_inicio: datetime</text>
  <text x="1164" y="821" class="text">+fecha_actualizacion: datetime</text>
  <text x="1164" y="841" class="text">+fecha_envio: datetime?</text>

  <line x1="260" y1="200" x2="310" y2="200" class="arrow" marker-end="url(#arrow)"/>
  <line x1="510" y1="200" x2="560" y2="200" class="arrow" marker-end="url(#arrow)"/>
  <line x1="260" y1="432" x2="310" y2="432" class="arrow" marker-end="url(#arrow)"/>
  <line x1="510" y1="432" x2="560" y2="432" class="arrow" marker-end="url(#arrow)"/>
  <line x1="260" y1="456" x2="850" y2="456" class="arrow" marker-end="url(#arrow)"/>
  <line x1="1070" y1="429" x2="1120" y2="429" class="arrow" marker-end="url(#arrow)"/>

  <line x1="530" y1="698" x2="620" y2="698" class="arrow" marker-end="url(#arrow)"/>
  <text x="557" y="686" class="label">usuario_id</text>
  <text x="560" y="718" class="label">1</text>
  <text x="600" y="718" class="label">0..*</text>

  <line x1="1090" y1="736" x2="1150" y2="736" class="arrow" marker-end="url(#arrow)"/>
  <text x="1107" y="724" class="label">encuesta_id</text>
  <text x="1116" y="756" class="label">1</text>
  <text x="1140" y="756" class="label">0..1</text>

  <path d="M 640 252 L 640 540 L 855 540 L 855 618" class="arrow dash" marker-end="url(#arrow)"/>
  <path d="M 640 252 L 640 560 L 1275 560 L 1275 646" class="arrow dash" marker-end="url(#arrow)"/>
  <path d="M 640 468 L 640 520 L 875 520 L 875 618" class="arrow dash" marker-end="url(#arrow)"/>
  <path d="M 640 468 L 640 540 L 1295 540 L 1295 646" class="arrow dash" marker-end="url(#arrow)"/>
</svg>
