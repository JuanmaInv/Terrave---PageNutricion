<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-labelledby="title desc">
  <title id="title">Diagrama UML de clases (alto nivel) - Terrave / NutriLen</title>
  <desc id="desc">Version simplificada y ordenada del diagrama UML de alto nivel del proyecto Terrave NutriLen.</desc>
  <defs>
    <style>
      .bg { fill: #f4f7fb; }
      .frame { fill: #ffffff; stroke: #d2d9e3; stroke-width: 2; }
      .pkg { fill: #f8fafc; stroke: #475569; stroke-width: 2; }
      .box { fill: #ffffff; stroke: #60a5fa; stroke-width: 2; }
      .divider { stroke: #dbe3ec; stroke-width: 1.2; }
      .arrow { fill: none; stroke: #334155; stroke-width: 2.2; }
      .dash { stroke-dasharray: 6 5; }
      .title { font: 700 28px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .section { font: 700 18px Arial, Helvetica, sans-serif; fill: #111827; }
      .classTitle { font: 700 15px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .text { font: 13px Consolas, "Courier New", monospace; fill: #1f2937; }
      .label { font: 12px Arial, Helvetica, sans-serif; fill: #334155; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1500" height="900" class="bg"/>
  <rect x="12" y="12" width="1476" height="876" rx="18" class="frame"/>
  <text x="750" y="52" text-anchor="middle" class="title">Diagrama UML de clases (alto nivel) - Terrave / NutriLen</text>

  <rect x="40" y="92" width="760" height="170" rx="6" class="pkg"/>
  <text x="420" y="118" text-anchor="middle" class="section">Modulo Encuestas</text>

  <rect x="60" y="146" width="200" height="94" rx="4" class="box"/>
  <line x1="60" y1="178" x2="260" y2="178" class="divider"/>
  <text x="160" y="166" text-anchor="middle" class="classTitle">EncuestasController</text>
  <text x="74" y="200" class="text">+create(body)</text>
  <text x="74" y="220" class="text">+createSession(body)</text>
  <text x="74" y="240" class="text">+updateSession(id, body)</text>

  <rect x="310" y="146" width="200" height="94" rx="4" class="box"/>
  <line x1="310" y1="178" x2="510" y2="178" class="divider"/>
  <text x="410" y="166" text-anchor="middle" class="classTitle">EncuestasService</text>
  <text x="324" y="200" class="text">+create(dto)</text>
  <text x="324" y="220" class="text">+createSession(dto)</text>
  <text x="324" y="240" class="text">+updateSession(id, dto)</text>

  <rect x="560" y="138" width="220" height="102" rx="4" class="box"/>
  <line x1="560" y1="170" x2="780" y2="170" class="divider"/>
  <text x="670" y="158" text-anchor="middle" class="classTitle">EncuestasRepository</text>
  <text x="574" y="192" class="text">+create(dto, id, fecha)</text>
  <text x="574" y="212" class="text">+createSession(id, dto)</text>
  <text x="574" y="232" class="text">+updateSession(id, dto)</text>

  <rect x="40" y="292" width="760" height="170" rx="6" class="pkg"/>
  <text x="420" y="318" text-anchor="middle" class="section">Modulo Estadisticas</text>

  <rect x="60" y="346" width="200" height="94" rx="4" class="box"/>
  <line x1="60" y1="378" x2="260" y2="378" class="divider"/>
  <text x="160" y="366" text-anchor="middle" class="classTitle">EstadisticasController</text>
  <text x="74" y="400" class="text">+getSummary(query)</text>
  <text x="74" y="420" class="text">+getStats(query)</text>
  <text x="74" y="440" class="text">+exportExcel(query, res)</text>

  <rect x="310" y="346" width="200" height="94" rx="4" class="box"/>
  <line x1="310" y1="378" x2="510" y2="378" class="divider"/>
  <text x="410" y="366" text-anchor="middle" class="classTitle">EstadisticasService</text>
  <text x="324" y="400" class="text">+getSurveys(query)</text>
  <text x="324" y="420" class="text">+getDashboardSummary(query)</text>
  <text x="324" y="440" class="text">+getExcelReport(query)</text>

  <rect x="560" y="346" width="220" height="82" rx="4" class="box"/>
  <line x1="560" y1="378" x2="780" y2="378" class="divider"/>
  <text x="670" y="366" text-anchor="middle" class="classTitle">EstadisticasRepository</text>
  <text x="574" y="400" class="text">+findAll(query)</text>
  <text x="574" y="420" class="text">+getDashboardSummary(query)</text>

  <rect x="860" y="292" width="580" height="170" rx="6" class="pkg"/>
  <text x="1150" y="318" text-anchor="middle" class="section">Seguridad e infraestructura</text>

  <rect x="890" y="346" width="220" height="82" rx="4" class="box"/>
  <line x1="890" y1="378" x2="1110" y2="378" class="divider"/>
  <text x="1000" y="366" text-anchor="middle" class="classTitle">AdminGuard</text>
  <text x="904" y="400" class="text">+canActivate(context)</text>

  <rect x="1150" y="338" width="260" height="94" rx="4" class="box"/>
  <line x1="1150" y1="370" x2="1410" y2="370" class="divider"/>
  <text x="1280" y="358" text-anchor="middle" class="classTitle">AdminService</text>
  <text x="1164" y="392" class="text">+getTokenFromAuthorization(...)</text>
  <text x="1164" y="412" class="text">+validateAdminToken(...)</text>
  <text x="1164" y="432" class="text">+getAccessProfileFromToken(...)</text>

  <rect x="110" y="510" width="1330" height="330" rx="6" class="pkg"/>
  <text x="775" y="536" text-anchor="middle" class="section">Dominio / Base de datos</text>

  <rect x="150" y="594" width="280" height="128" rx="4" class="box"/>
  <line x1="150" y1="626" x2="430" y2="626" class="divider"/>
  <text x="290" y="614" text-anchor="middle" class="classTitle">usuarios</text>
  <text x="164" y="648" class="text">+id: string</text>
  <text x="164" y="668" class="text">+activo: boolean</text>
  <text x="164" y="688" class="text">+fecha_registro: datetime</text>
  <text x="164" y="710" class="text">+nombre: string</text>
  <text x="164" y="730" class="text">+email: string</text>
  <text x="164" y="750" class="text">+rol: string</text>

  <rect x="520" y="576" width="520" height="224" rx="4" class="box"/>
  <line x1="520" y1="608" x2="1040" y2="608" class="divider"/>
  <line x1="520" y1="660" x2="1040" y2="660" class="divider"/>
  <text x="780" y="597" text-anchor="middle" class="classTitle">encuestas</text>
  <text x="536" y="630" class="text">+id: string</text>
  <text x="536" y="650" class="text">+usuario_id: string?</text>
  <text x="536" y="678" class="text">+fecha: datetime</text>
  <text x="536" y="698" class="text">+sexo: string</text>
  <text x="536" y="718" class="text">+dieta: string</text>
  <text x="536" y="738" class="text">+color: number</text>
  <text x="536" y="758" class="text">+aroma: number</text>
  <text x="536" y="778" class="text">+firmeza: number</text>
  <text x="790" y="678" class="text">+aceptacion: number</text>
  <text x="790" y="698" class="text">+liked: string</text>
  <text x="790" y="718" class="text">+consume_again: string</text>
  <text x="790" y="738" class="text">+recommend: number</text>
  <text x="790" y="758" class="text">+persistencia: number</text>
  <text x="790" y="778" class="text">+sabor_tostado: number</text>

  <rect x="1120" y="598" width="280" height="170" rx="4" class="box"/>
  <line x1="1120" y1="630" x2="1400" y2="630" class="divider"/>
  <text x="1260" y="618" text-anchor="middle" class="classTitle">encuesta_sesiones</text>
  <text x="1134" y="652" class="text">+id: string</text>
  <text x="1134" y="672" class="text">+encuesta_id: string?</text>
  <text x="1134" y="692" class="text">+client_session_key: string</text>
  <text x="1134" y="712" class="text">+estado: string</text>
  <text x="1134" y="732" class="text">+paso_actual: number</text>
  <text x="1134" y="752" class="text">+fecha_inicio: datetime</text>
  <text x="1134" y="772" class="text">+fecha_envio: datetime?</text>

  <line x1="260" y1="193" x2="310" y2="193" class="arrow" marker-end="url(#arrow)"/>
  <line x1="510" y1="193" x2="560" y2="193" class="arrow" marker-end="url(#arrow)"/>
  <line x1="260" y1="393" x2="310" y2="393" class="arrow" marker-end="url(#arrow)"/>
  <line x1="510" y1="393" x2="560" y2="393" class="arrow" marker-end="url(#arrow)"/>
  <line x1="780" y1="393" x2="890" y2="393" class="arrow" marker-end="url(#arrow)"/>
  <line x1="1110" y1="387" x2="1150" y2="387" class="arrow" marker-end="url(#arrow)"/>

  <line x1="430" y1="658" x2="520" y2="658" class="arrow" marker-end="url(#arrow)"/>
  <text x="453" y="646" class="label">usuario_id</text>
  <text x="456" y="678" class="label">1</text>
  <text x="495" y="678" class="label">0..*</text>

  <line x1="1040" y1="684" x2="1120" y2="684" class="arrow" marker-end="url(#arrow)"/>
  <text x="1060" y="672" class="label">encuesta_id</text>
  <text x="1070" y="704" class="label">1</text>
  <text x="1100" y="704" class="label">0..1</text>

  <path d="M 670 240 L 670 548 L 760 548 L 760 576" class="arrow dash" marker-end="url(#arrow)"/>
  <path d="M 710 240 L 710 560 L 1260 560 L 1260 598" class="arrow dash" marker-end="url(#arrow)"/>
  <path d="M 690 428 L 690 528 L 800 528 L 800 576" class="arrow dash" marker-end="url(#arrow)"/>
  <path d="M 730 428 L 730 540 L 1300 540 L 1300 598" class="arrow dash" marker-end="url(#arrow)"/>
</svg>
