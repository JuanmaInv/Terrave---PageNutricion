<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Diagrama UML de clases (alto nivel) - Terrave / NutriLen</title>
  <desc id="desc">Diagrama de clases de alto nivel con dominio, modulo encuestas, modulo estadisticas y seguridad e infraestructura.</desc>
  <defs>
    <style>
      .title { font: 700 22px Arial, Helvetica, sans-serif; fill: #111827; }
      .section { font: 700 14px Arial, Helvetica, sans-serif; fill: #111827; }
      .class-title { font: 700 14px Arial, Helvetica, sans-serif; fill: #1f2937; }
      .text { font: 12px Consolas, "Courier New", monospace; fill: #1f2937; }
      .small { font: 11px Arial, Helvetica, sans-serif; fill: #374151; }
      .pkg { fill: #fbfbfc; stroke: #4b5563; stroke-width: 1.5; }
      .box-domain { fill: #f7fbff; stroke: #60a5fa; stroke-width: 1.5; }
      .box-service { fill: #fff7ed; stroke: #fb923c; stroke-width: 1.5; }
      .box-impl { fill: #f0fdf4; stroke: #4ade80; stroke-width: 1.5; }
      .box-infra { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; }
      .divider { stroke: #cbd5e1; stroke-width: 1; }
      .arrow { stroke: #6b7280; stroke-width: 1.5; fill: none; }
      .dashed { stroke-dasharray: 6 4; }
      .label { font: 12px Arial, Helvetica, sans-serif; fill: #374151; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <text x="800" y="32" text-anchor="middle" class="title">Diagrama UML de clases (alto nivel) - Terrave / NutriLen</text>

  <!-- Dominio -->
  <rect x="540" y="58" width="1010" height="360" rx="2" class="pkg"/>
  <text x="1045" y="82" text-anchor="middle" class="section">Dominio / Base de datos</text>

  <rect x="610" y="120" width="280" height="126" rx="2" class="box-domain"/>
  <line x1="610" y1="152" x2="890" y2="152" class="divider"/>
  <text x="750" y="141" text-anchor="middle" class="class-title">usuarios</text>
  <text x="622" y="172" class="text">+id: string</text>
  <text x="622" y="190" class="text">+activo: boolean</text>
  <text x="622" y="208" class="text">+fecha_registro: datetime</text>
  <text x="622" y="228" class="text">+nombre: string</text>
  <text x="622" y="246" class="text">+email: string</text>
  <text x="622" y="264" class="text">+rol: string</text>

  <rect x="1010" y="86" width="410" height="290" rx="2" class="box-domain"/>
  <line x1="1010" y1="118" x2="1420" y2="118" class="divider"/>
  <line x1="1010" y1="172" x2="1420" y2="172" class="divider"/>
  <text x="1215" y="108" text-anchor="middle" class="class-title">encuestas</text>
  <text x="1022" y="138" class="text">+id: string</text>
  <text x="1022" y="156" class="text">+usuario_id: string?</text>
  <text x="1022" y="190" class="text">+fecha: datetime</text>
  <text x="1022" y="208" class="text">+sexo: string</text>
  <text x="1022" y="226" class="text">+dieta: string</text>
  <text x="1022" y="244" class="text">+color: number</text>
  <text x="1022" y="262" class="text">+aroma: number</text>
  <text x="1022" y="280" class="text">+firmeza: number</text>
  <text x="1022" y="298" class="text">+untuosidad: number</text>
  <text x="1022" y="316" class="text">+sabor_tostado: number</text>
  <text x="1022" y="334" class="text">+persistencia: number</text>
  <text x="1022" y="352" class="text">+aceptacion: number</text>
  <text x="1218" y="190" class="text">+liked: string</text>
  <text x="1218" y="208" class="text">+consume_again: string</text>
  <text x="1218" y="226" class="text">+recommend: number</text>

  <rect x="1450" y="130" width="125" height="200" rx="2" class="box-domain"/>
  <line x1="1450" y1="162" x2="1575" y2="162" class="divider"/>
  <text x="1512.5" y="151" text-anchor="middle" class="class-title">encuesta_sesiones</text>
  <text x="1460" y="180" class="text">+id: string</text>
  <text x="1460" y="198" class="text">+encuesta_id: string?</text>
  <text x="1460" y="216" class="text">+client_session_key: string</text>
  <text x="1460" y="234" class="text">+estado: string</text>
  <text x="1460" y="252" class="text">+paso_actual: number</text>
  <text x="1460" y="270" class="text">+fecha_inicio: datetime</text>
  <text x="1460" y="288" class="text">+fecha_actualizacion: datetime</text>
  <text x="1460" y="306" class="text">+fecha_envio: datetime?</text>

  <!-- Modulo Encuestas -->
  <rect x="28" y="460" width="870" height="172" rx="2" class="pkg"/>
  <text x="463" y="484" text-anchor="middle" class="section">Modulo Encuestas</text>

  <rect x="50" y="510" width="220" height="108" rx="2" class="box-service"/>
  <line x1="50" y1="542" x2="270" y2="542" class="divider"/>
  <text x="160" y="531" text-anchor="middle" class="class-title">EncuestasController</text>
  <text x="62" y="562" class="text">+create(body)</text>
  <text x="62" y="580" class="text">+createSession(body)</text>
  <text x="62" y="598" class="text">+updateSession(id, body)</text>

  <rect x="340" y="510" width="230" height="108" rx="2" class="box-service"/>
  <line x1="340" y1="542" x2="570" y2="542" class="divider"/>
  <text x="455" y="531" text-anchor="middle" class="class-title">EncuestasService</text>
  <text x="352" y="562" class="text">+create(dto)</text>
  <text x="352" y="580" class="text">+createSession(dto)</text>
  <text x="352" y="598" class="text">+updateSession(id, dto)</text>

  <rect x="660" y="494" width="210" height="124" rx="2" class="box-impl"/>
  <line x1="660" y1="526" x2="870" y2="526" class="divider"/>
  <text x="765" y="515" text-anchor="middle" class="class-title">EncuestasRepository</text>
  <text x="672" y="546" class="text">-lastExpiredSessionsCleanupAt: number</text>
  <text x="672" y="568" class="text">+create(dto, id, fecha)</text>
  <text x="672" y="586" class="text">+createSession(id, dto)</text>
  <text x="672" y="604" class="text">+updateSession(id, dto)</text>

  <!-- Modulo Estadisticas -->
  <rect x="28" y="678" width="870" height="170" rx="2" class="pkg"/>
  <text x="463" y="702" text-anchor="middle" class="section">Modulo Estadisticas</text>

  <rect x="50" y="726" width="220" height="108" rx="2" class="box-service"/>
  <line x1="50" y1="758" x2="270" y2="758" class="divider"/>
  <text x="160" y="747" text-anchor="middle" class="class-title">EstadisticasController</text>
  <text x="62" y="778" class="text">+getSummary(query)</text>
  <text x="62" y="796" class="text">+getStats(query)</text>
  <text x="62" y="814" class="text">+exportExcel(query, res)</text>

  <rect x="340" y="726" width="230" height="108" rx="2" class="box-service"/>
  <line x1="340" y1="758" x2="570" y2="758" class="divider"/>
  <text x="455" y="747" text-anchor="middle" class="class-title">EstadisticasService</text>
  <text x="352" y="778" class="text">+getSurveys(query)</text>
  <text x="352" y="796" class="text">+getDashboardSummary(query)</text>
  <text x="352" y="814" class="text">+getExcelReport(query)</text>

  <rect x="660" y="742" width="210" height="92" rx="2" class="box-impl"/>
  <line x1="660" y1="774" x2="870" y2="774" class="divider"/>
  <text x="765" y="763" text-anchor="middle" class="class-title">EstadisticasRepository</text>
  <text x="672" y="794" class="text">+findAll(query)</text>
  <text x="672" y="812" class="text">+getDashboardSummary(query)</text>

  <!-- Seguridad -->
  <rect x="940" y="678" width="610" height="170" rx="2" class="pkg"/>
  <text x="1245" y="702" text-anchor="middle" class="section">Seguridad e infraestructura</text>

  <rect x="980" y="740" width="180" height="76" rx="2" class="box-infra"/>
  <line x1="980" y1="772" x2="1160" y2="772" class="divider"/>
  <text x="1070" y="761" text-anchor="middle" class="class-title">AdminGuard</text>
  <text x="992" y="792" class="text">+canActivate(context)</text>

  <rect x="1210" y="724" width="240" height="108" rx="2" class="box-infra"/>
  <line x1="1210" y1="756" x2="1450" y2="756" class="divider"/>
  <text x="1330" y="745" text-anchor="middle" class="class-title">AdminService</text>
  <text x="1222" y="776" class="text">+getTokenFromAuthorization(...)</text>
  <text x="1222" y="794" class="text">+validateAdminToken(...)</text>
  <text x="1222" y="812" class="text">+getAccessProfileFromToken(...)</text>

  <!-- arrows -->
  <line x1="270" y1="564" x2="340" y2="564" class="arrow" marker-end="url(#arrow)"/>
  <line x1="570" y1="564" x2="660" y2="564" class="arrow" marker-end="url(#arrow)"/>
  <line x1="270" y1="780" x2="340" y2="780" class="arrow" marker-end="url(#arrow)"/>
  <line x1="570" y1="780" x2="660" y2="780" class="arrow" marker-end="url(#arrow)"/>
  <line x1="270" y1="792" x2="980" y2="792" class="arrow" marker-end="url(#arrow)"/>
  <line x1="1160" y1="778" x2="1210" y2="778" class="arrow" marker-end="url(#arrow)"/>

  <!-- entity relations -->
  <line x1="890" y1="183" x2="1010" y2="183" class="arrow" marker-end="url(#arrow)"/>
  <text x="948" y="173" class="label">usuario_id</text>
  <text x="913" y="201" class="small">1</text>
  <text x="986" y="201" class="small">0..*</text>

  <path d="M 1420 214 C 1450 214, 1460 214, 1460 214" class="arrow" marker-end="url(#arrow)"/>
  <text x="1435" y="202" class="label">encuesta_id</text>
  <text x="1414" y="232" class="small">1</text>
  <text x="1458" y="232" class="small">0..1</text>

  <!-- repository dependencies -->
  <path d="M 870 548 C 930 548, 950 380, 1010 380" class="arrow dashed" marker-end="url(#arrow)"/>
  <path d="M 870 580 C 980 580, 1320 580, 1450 298" class="arrow dashed" marker-end="url(#arrow)"/>
  <path d="M 870 788 C 930 788, 960 406, 1010 406" class="arrow dashed" marker-end="url(#arrow)"/>
  <path d="M 870 806 C 980 806, 1340 806, 1450 320" class="arrow dashed" marker-end="url(#arrow)"/>
</svg>
