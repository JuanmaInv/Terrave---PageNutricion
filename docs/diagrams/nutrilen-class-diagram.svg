<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="900" viewBox="0 0 1480 900" role="img" aria-labelledby="title desc">
  <title id="title">Diagrama UML de clases (alto nivel) - Terrave / NutriLen</title>
  <desc id="desc">Diagrama de clases de alto nivel con dominio, modulo encuestas, modulo estadisticas y seguridad e infraestructura.</desc>
  <defs>
    <style>
      .page { fill: #ffffff; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .title { font: 700 28px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .section { font: 700 17px Arial, Helvetica, sans-serif; fill: #111827; }
      .class-title { font: 700 15px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .text { font: 13px Consolas, "Courier New", monospace; fill: #1f2937; }
      .small { font: 12px Arial, Helvetica, sans-serif; fill: #334155; }
      .pkg { fill: #fafafa; stroke: #475569; stroke-width: 2; }
      .box-domain { fill: #eef6ff; stroke: #60a5fa; stroke-width: 2; }
      .box-service { fill: #fff7ed; stroke: #fb923c; stroke-width: 2; }
      .box-impl { fill: #f0fdf4; stroke: #4ade80; stroke-width: 2; }
      .box-infra { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2; }
      .divider { stroke: #cbd5e1; stroke-width: 1.2; }
      .arrow { stroke: #334155; stroke-width: 2.4; fill: none; }
      .dashed { stroke-dasharray: 7 5; }
      .label { font: 13px Arial, Helvetica, sans-serif; fill: #1e293b; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1480" height="900" class="page"/>
  <rect x="22" y="18" width="1436" height="862" rx="14" class="card"/>
  <text x="740" y="55" text-anchor="middle" class="title">Diagrama UML de clases (alto nivel) - Terrave / NutriLen</text>

  <rect x="392" y="86" width="1018" height="296" rx="6" class="pkg"/>
  <text x="901" y="111" text-anchor="middle" class="section">Dominio / Base de datos</text>

  <rect x="430" y="134" width="280" height="132" rx="4" class="box-domain"/>
  <line x1="430" y1="167" x2="710" y2="167" class="divider"/>
  <text x="570" y="155" text-anchor="middle" class="class-title">usuarios</text>
  <text x="444" y="189" class="text">+id: string</text>
  <text x="444" y="209" class="text">+activo: boolean</text>
  <text x="444" y="229" class="text">+fecha_registro: datetime</text>
  <text x="444" y="251" class="text">+nombre: string</text>
  <text x="444" y="271" class="text">+email: string</text>
  <text x="444" y="291" class="text">+rol: string</text>

  <rect x="808" y="118" width="448" height="224" rx="4" class="box-domain"/>
  <line x1="808" y1="151" x2="1256" y2="151" class="divider"/>
  <line x1="808" y1="208" x2="1256" y2="208" class="divider"/>
  <text x="1032" y="140" text-anchor="middle" class="class-title">encuestas</text>
  <text x="822" y="176" class="text">+id: string</text>
  <text x="822" y="196" class="text">+usuario_id: string?</text>
  <text x="822" y="226" class="text">+fecha: datetime</text>
  <text x="822" y="246" class="text">+sexo: string</text>
  <text x="822" y="266" class="text">+dieta: string</text>
  <text x="822" y="286" class="text">+color: number</text>
  <text x="822" y="306" class="text">+aroma: number</text>
  <text x="822" y="326" class="text">+firmeza: number</text>
  <text x="1042" y="226" class="text">+untuosidad: number</text>
  <text x="1042" y="246" class="text">+sabor_tostado: number</text>
  <text x="1042" y="266" class="text">+persistencia: number</text>
  <text x="1042" y="286" class="text">+aceptacion: number</text>
  <text x="1042" y="306" class="text">+liked: string</text>
  <text x="1042" y="326" class="text">+consume_again: string</text>
  <text x="1042" y="346" class="text">+recommend: number</text>

  <rect x="1284" y="140" width="104" height="190" rx="4" class="box-domain"/>
  <line x1="1284" y1="173" x2="1388" y2="173" class="divider"/>
  <text x="1336" y="161" text-anchor="middle" class="class-title">encuesta_sesiones</text>
  <text x="1295" y="194" class="text">+id: string</text>
  <text x="1295" y="214" class="text">+encuesta_id: string?</text>
  <text x="1295" y="234" class="text">+client_session_key: string</text>
  <text x="1295" y="254" class="text">+estado: string</text>
  <text x="1295" y="274" class="text">+paso_actual: number</text>
  <text x="1295" y="294" class="text">+fecha_inicio: datetime</text>
  <text x="1295" y="314" class="text">+fecha_actualizacion: datetime</text>
  <text x="1295" y="334" class="text">+fecha_envio: datetime?</text>

  <rect x="40" y="434" width="830" height="176" rx="6" class="pkg"/>
  <text x="455" y="459" text-anchor="middle" class="section">Modulo Encuestas</text>

  <rect x="60" y="485" width="206" height="112" rx="4" class="box-service"/>
  <line x1="60" y1="518" x2="266" y2="518" class="divider"/>
  <text x="163" y="506" text-anchor="middle" class="class-title">EncuestasController</text>
  <text x="73" y="540" class="text">+create(body)</text>
  <text x="73" y="560" class="text">+createSession(body)</text>
  <text x="73" y="580" class="text">+updateSession(id, body)</text>

  <rect x="324" y="485" width="220" height="112" rx="4" class="box-service"/>
  <line x1="324" y1="518" x2="544" y2="518" class="divider"/>
  <text x="434" y="506" text-anchor="middle" class="class-title">EncuestasService</text>
  <text x="338" y="540" class="text">+create(dto)</text>
  <text x="338" y="560" class="text">+createSession(dto)</text>
  <text x="338" y="580" class="text">+updateSession(id, dto)</text>

  <rect x="616" y="470" width="222" height="127" rx="4" class="box-impl"/>
  <line x1="616" y1="503" x2="838" y2="503" class="divider"/>
  <text x="727" y="491" text-anchor="middle" class="class-title">EncuestasRepository</text>
  <text x="630" y="526" class="text">-lastExpiredSessionsCleanupAt: number</text>
  <text x="630" y="548" class="text">+create(dto, id, fecha)</text>
  <text x="630" y="568" class="text">+createSession(id, dto)</text>
  <text x="630" y="588" class="text">+updateSession(id, dto)</text>

  <rect x="40" y="646" width="830" height="176" rx="6" class="pkg"/>
  <text x="455" y="671" text-anchor="middle" class="section">Modulo Estadisticas</text>

  <rect x="60" y="697" width="206" height="112" rx="4" class="box-service"/>
  <line x1="60" y1="730" x2="266" y2="730" class="divider"/>
  <text x="163" y="718" text-anchor="middle" class="class-title">EstadisticasController</text>
  <text x="73" y="752" class="text">+getSummary(query)</text>
  <text x="73" y="772" class="text">+getStats(query)</text>
  <text x="73" y="792" class="text">+exportExcel(query, res)</text>

  <rect x="324" y="697" width="220" height="112" rx="4" class="box-service"/>
  <line x1="324" y1="730" x2="544" y2="730" class="divider"/>
  <text x="434" y="718" text-anchor="middle" class="class-title">EstadisticasService</text>
  <text x="338" y="752" class="text">+getSurveys(query)</text>
  <text x="338" y="772" class="text">+getDashboardSummary(query)</text>
  <text x="338" y="792" class="text">+getExcelReport(query)</text>

  <rect x="616" y="713" width="222" height="96" rx="4" class="box-impl"/>
  <line x1="616" y1="746" x2="838" y2="746" class="divider"/>
  <text x="727" y="734" text-anchor="middle" class="class-title">EstadisticasRepository</text>
  <text x="630" y="770" class="text">+findAll(query)</text>
  <text x="630" y="790" class="text">+getDashboardSummary(query)</text>

  <rect x="920" y="646" width="490" height="176" rx="6" class="pkg"/>
  <text x="1165" y="671" text-anchor="middle" class="section">Seguridad e infraestructura</text>

  <rect x="954" y="716" width="182" height="82" rx="4" class="box-infra"/>
  <line x1="954" y1="749" x2="1136" y2="749" class="divider"/>
  <text x="1045" y="737" text-anchor="middle" class="class-title">AdminGuard</text>
  <text x="968" y="773" class="text">+canActivate(context)</text>

  <rect x="1172" y="700" width="212" height="112" rx="4" class="box-infra"/>
  <line x1="1172" y1="733" x2="1384" y2="733" class="divider"/>
  <text x="1278" y="721" text-anchor="middle" class="class-title">AdminService</text>
  <text x="1186" y="755" class="text">+getTokenFromAuthorization(...)</text>
  <text x="1186" y="775" class="text">+validateAdminToken(...)</text>
  <text x="1186" y="795" class="text">+getAccessProfileFromToken(...)</text>

  <line x1="266" y1="541" x2="324" y2="541" class="arrow" marker-end="url(#arrow)"/>
  <line x1="544" y1="541" x2="616" y2="541" class="arrow" marker-end="url(#arrow)"/>
  <line x1="266" y1="753" x2="324" y2="753" class="arrow" marker-end="url(#arrow)"/>
  <line x1="544" y1="753" x2="616" y2="753" class="arrow" marker-end="url(#arrow)"/>
  <line x1="266" y1="781" x2="954" y2="781" class="arrow" marker-end="url(#arrow)"/>
  <line x1="1136" y1="757" x2="1172" y2="757" class="arrow" marker-end="url(#arrow)"/>

  <line x1="710" y1="199" x2="808" y2="199" class="arrow" marker-end="url(#arrow)"/>
  <text x="751" y="187" class="label">usuario_id</text>
  <text x="742" y="218" class="small">1</text>
  <text x="790" y="218" class="small">0..*</text>

  <line x1="1256" y1="228" x2="1284" y2="228" class="arrow" marker-end="url(#arrow)"/>
  <text x="1234" y="214" class="label">encuesta_id</text>
  <text x="1242" y="248" class="small">1</text>
  <text x="1272" y="248" class="small">0..1</text>

  <path d="M 838 528 C 900 528, 920 360, 980 360" class="arrow dashed" marker-end="url(#arrow)"/>
  <path d="M 838 560 C 940 560, 1180 560, 1284 320" class="arrow dashed" marker-end="url(#arrow)"/>
  <path d="M 838 754 C 920 754, 950 390, 980 390" class="arrow dashed" marker-end="url(#arrow)"/>
  <path d="M 838 782 C 940 782, 1200 782, 1284 342" class="arrow dashed" marker-end="url(#arrow)"/>
</svg>
